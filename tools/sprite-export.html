// ── Style info for the game's layout ────────────────────────────────────────

const STYLE_NOTE = `
GAME CONTEXT — Wisdom Defenders (שומרי החוכמה)
A Hebrew educational tower defense game for preschoolers (ages 5-6), inspired by Plants vs Zombies.
Canvas: 960×540px. Grid: 3 rows × 6 columns. RTL layout (enemies from left, house on right).
Cell size: ~117×133px. Characters render at ~82px diameter (CELL_W × 0.35 × 2).
All art must be: child-safe, kawaii/cute, rounded shapes, non-scary, bright colors, no text reading required.

// ── Rendering ───────────────────────────────────────────────────────────────

let renderSize = 256;
let bgColor = 'transparent';
let animTime = 0;
let animFrame = null;

function getSize() {
    return parseInt(document.getElementById('render-size').value);
}

function getBg() {
    return document.getElementById('bg-color').value;
}

function renderSprite(canvas, drawFn, drawCustom, isProjectile = false) {
    const size = getSize();
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    ctx.clearRect(0, 0, size, size);

    const bg = getBg();
    if (bg !== 'transparent') {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);
    }

    const cx = size / 2;
    const cy = size / 2;
    const spriteSize = size * 0.35;

    if (drawCustom) {
        drawCustom(ctx, cx, cy, isProjectile ? spriteSize * 0.5 : spriteSize, animTime);
    } else if (drawFn) {
        drawFn(ctx, cx, cy, spriteSize, animTime);
    }
}

function createCard(character, container) {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = character.id;

    const tagClass = `tag-${character.tag}`;
    const tagLabel = character.tag.charAt(0).toUpperCase() + character.tag.slice(1);

    // Header
    const header = document.createElement('div');
    header.className = 'card-header';
    header.innerHTML = `
        <h3>${character.name}${character.hebrewName ? ` (${character.hebrewName})` : ''}</h3>
        <span class="tag ${tagClass}">${tagLabel}</span>
    `;
    card.appendChild(header);

    // Role
    if (character.role) {
        const roleDiv = document.createElement('div');
        roleDiv.style.cssText = 'padding: 8px 16px; font-size: 12px; color: #8b949e; border-bottom: 1px solid #21262d;';
        roleDiv.textContent = character.role;
        card.appendChild(roleDiv);
    }

    // Canvas row — static + animated
    const canvasRow = document.createElement('div');
    canvasRow.className = 'canvas-row';

    const canvasStatic = document.createElement('canvas');
    canvasStatic.title = 'Static pose (click to download)';
    const canvasAnim = document.createElement('canvas');
    canvasAnim.title = 'Animated preview';

    canvasRow.appendChild(canvasStatic);
    canvasRow.appendChild(canvasAnim);
    card.appendChild(canvasRow);

    // Store references for animation loop
    card._canvasStatic = canvasStatic;
    card._canvasAnim = canvasAnim;
    card._drawFn = character.drawFn || null;
    card._drawCustom = character.drawCustom || null;
    card._isProjectile = character.tag === 'projectile';
    card._id = character.id;

    // Render static at time=0
    renderSprite(canvasStatic, card._drawFn, card._drawCustom, card._isProjectile);

    // Size info
    const sizeInfo = document.createElement('div');
    sizeInfo.className = 'size-info';
    sizeInfo.textContent = `In-game: renders at ~82px diameter in a 117×133px cell (CELL_W×0.35 for size param)`;
    card.appendChild(sizeInfo);

    // Export actions
    const actions = document.createElement('div');
    actions.className = 'export-actions';
    const dlBtn = document.createElement('button');
    dlBtn.textContent = 'Download PNG';
    dlBtn.onclick = () => downloadCanvas(canvasStatic, character.id);
    actions.appendChild(dlBtn);

    const dlAnimBtn = document.createElement('button');
    dlAnimBtn.textContent = 'Download Current Frame';
    dlAnimBtn.onclick = () => downloadCanvas(canvasAnim, `${character.id}-frame`);
    actions.appendChild(dlAnimBtn);
    card.appendChild(actions);

    // Prompt section
    const promptSection = document.createElement('div');
    promptSection.className = 'prompt-section';

    const promptLabel = document.createElement('div');
    promptLabel.className = 'prompt-label';
    promptLabel.textContent = 'AI Generation Prompt';
    promptSection.appendChild(promptLabel);

    const promptBox = document.createElement('div');
    promptBox.className = 'prompt-box';
    promptBox.textContent = character.prompt;

    const copyBtn = document.createElement('button');
    copyBtn.className = 'copy-btn';
    copyBtn.textContent = 'Copy';
    copyBtn.onclick = () => {
        navigator.clipboard.writeText(character.prompt).then(() => showToast('Prompt copied!'));
    };
    promptBox.appendChild(copyBtn);
    promptSection.appendChild(promptBox);
    card.appendChild(promptSection);

    container.appendChild(card);
    return card;
}

// ── Build UI ────────────────────────────────────────────────────────────────

const allCards = [];

function buildAll() {
    const grids = {
        defenders: document.getElementById('defenders-grid'),
        enemies: document.getElementById('enemies-grid'),
        projectiles: document.getElementById('projectiles-grid'),
        ui: document.getElementById('ui-grid'),
    };

    for (const [section, chars] of Object.entries(CHARACTERS)) {
        grids[section].innerHTML = '';
        for (const c of chars) {
            const card = createCard(c, grids[section]);
            allCards.push(card);
        }
    }
}

// ── Animation loop ──────────────────────────────────────────────────────────

function animate() {
    animTime = performance.now() / 1000;
    for (const card of allCards) {
        renderSprite(card._canvasAnim, card._drawFn, card._drawCustom, card._isProjectile);
    }
    animFrame = requestAnimationFrame(animate);
}

// ── Download helpers ────────────────────────────────────────────────────────

function downloadCanvas(canvas, name) {
    const link = document.createElement('a');
    link.download = `${name}-${getSize()}px.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
    showToast(`Downloaded ${link.download}`);
}

// Create a high-quality static render for downloads
function renderForDownload(character) {
    const size = getSize();
    const canvas = document.createElement('canvas');
    canvas.width = size;
    canvas.height = size;
    const ctx = canvas.getContext('2d');

    const bg = getBg();
    if (bg !== 'transparent') {
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, size, size);
    }

    const cx = size / 2;
    const cy = size / 2;
    const spriteSize = size * 0.35;
    const isProjectile = character.tag === 'projectile';

    if (character.drawCustom) {
        character.drawCustom(ctx, cx, cy, isProjectile ? spriteSize * 0.5 : spriteSize, 0);
    } else if (character.drawFn) {
        character.drawFn(ctx, cx, cy, spriteSize, 0);
    }

    return canvas;
}

window.downloadAllPNGs = async function() {
    // Simple sequential download (no zip library dependency)
    const allChars = [
        ...CHARACTERS.defenders,
        ...CHARACTERS.enemies,
        ...CHARACTERS.projectiles,
        ...CHARACTERS.ui,
    ];

    for (const char of allChars) {
        const canvas = renderForDownload(char);
        const link = document.createElement('a');
        link.download = `${char.id}-${getSize()}px.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
        // Small delay to prevent browser blocking rapid downloads
        await new Promise(r => setTimeout(r, 200));
    }
    showToast(`Downloaded ${allChars.length} PNGs`);
};

window.copyAllPrompts = function() {
    const allChars = [
        ...CHARACTERS.defenders,
        ...CHARACTERS.enemies,
        ...CHARACTERS.projectiles,
        ...CHARACTERS.ui,
    ];

    const text = allChars.map(c => {
        const label = c.hebrewName ? `${c.name} (${c.hebrewName})` : c.name;
        return `=== ${label} [${c.tag}] ===\n${c.prompt}`;
    }).join('\n\n');

    const full = `${STYLE_NOTE}\n\n${'='.repeat(60)}\n\n${text}`;

    navigator.clipboard.writeText(full).then(() => showToast('All prompts copied!'));
};

window.downloadPromptSheet = function() {
    const allChars = [
        ...CHARACTERS.defenders,
        ...CHARACTERS.enemies,
        ...CHARACTERS.projectiles,
        ...CHARACTERS.ui,
    ];

    const text = allChars.map(c => {
        const label = c.hebrewName ? `${c.name} (${c.hebrewName})` : c.name;
        return `=== ${label} [${c.tag}] ===\nRole: ${c.role || 'N/A'}\nID: ${c.id}\n\nPrompt:\n${c.prompt}`;
    }).join('\n\n' + '-'.repeat(60) + '\n\n');

    const full = `WISDOM DEFENDERS — AI Art Generation Prompt Sheet\n${'='.repeat(60)}\n\n${STYLE_NOTE}\n\n${'='.repeat(60)}\n\n${text}`;

    const blob = new Blob([full], { type: 'text/plain' });
    const link = document.createElement('a');
    link.download = 'wisdom-defenders-sprite-prompts.txt';
    link.href = URL.createObjectURL(blob);
    link.click();
    showToast('Prompt sheet downloaded!');
};

window.renderAll = function() {
    // Re-render static canvases
    for (const card of allCards) {
        const saved = animTime;
        animTime = 0;
        renderSprite(card._canvasStatic, card._drawFn, card._drawCustom, card._isProjectile);
        animTime = saved;
    }
    showToast('Re-rendered all sprites');
};

function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

// ── Init ────────────────────────────────────────────────────────────────────

document.getElementById('render-size').addEventListener('change', () => {
    for (const card of allCards) {
        animTime = 0;
        renderSprite(card._canvasStatic, card._drawFn, card._drawCustom, card._isProjectile);
    }
});

document.getElementById('bg-color').addEventListener('change', () => {
    for (const card of allCards) {
        animTime = 0;
        renderSprite(card._canvasStatic, card._drawFn, card._drawCustom, card._isProjectile);
    }
});

buildAll();
animate();
</script>
