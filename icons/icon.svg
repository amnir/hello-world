      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#98FB98"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#sky)"/>
  <!-- Star shape -->
  <polygon points="256,80 296,192 416,192 320,264 352,384 256,312 160,384 192,264 96,192 216,192"
           fill="#f1c40f" stroke="#d4ac0d" stroke-width="8"/>
  <!-- Star face - eyes -->
  <circle cx="224" cy="220" r="16" fill="#fff"/>
  <circle cx="288" cy="220" r="16" fill="#fff"/>
  <circle cx="228" cy="224" r="8" fill="#333"/>
  <circle cx="292" cy="224" r="8" fill="#333"/>
  <!-- Star face - smile -->
