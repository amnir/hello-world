<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body>
<h1>PWA Icon Generator</h1>
<p>Right-click each canvas and "Save Image As" to create the PNG icons.</p>
<h2>192x192</h2>
<canvas id="c192" width="192" height="192"></canvas>
<h2>512x512</h2>
<canvas id="c512" width="512" height="512"></canvas>
<script>
const sizes = [192, 512];
const img = new Image();
img.onload = () => {
    sizes.forEach(size => {
        const canvas = document.getElementById(`c${size}`);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, size, size);
    });
};
img.src = '../icons/icon.svg';
</script>
</body>
</html>
